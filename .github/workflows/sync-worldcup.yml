name: Sync World Cup data

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:

jobs:
  sync-worldcup:
    runs-on: ubuntu-latest

    steps:
      - name: Call Cup Clash sync endpoint
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${{ secrets.WORLD_CUP_SYNC_SECRET }}" \
            "https://cup-clash-rose.vercel.app/api/cron/sync-worldcup"